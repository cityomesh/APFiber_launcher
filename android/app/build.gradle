apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native configuration block
 */
react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.mynewapp"
    defaultConfig {
        applicationId "com.mynewapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"

        // FIX: C++20 support for std::format error
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++20 -D_LIBCPP_HAS_NO_INCOMPLETE_FORMAT"
            }
        }
    }

    // FIX: To handle Duplicate Resources
    packagingOptions {
        pickFirst '**/libc++_shared.so'
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // FIX: JVM-target compatibility (Set both to 17)
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }

    // FIX: Duplicate resources workaround
    project.ext.react = [
            enableHermes: true,
            extraPackagerArgs: ["--allow-duplicates"]
    ]
}

// FIX: Task to automatically delete duplicate assets before merging
tasks.whenTaskAdded { task ->
    if (task.name.contains('merge') && task.name.contains('Resources')) {
        task.doFirst {
            delete fileTree(dir: 'src/main/res', include: ['drawable-*/*', 'raw/*'])
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    // Check if hermes is enabled from root project
    if (rootProject.ext.hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
